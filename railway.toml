[build]
builder = "nixpacks"

[deploy]
startCommand = "timeout 30 alembic upgrade head || echo 'ALEMBIC TIMEOUT/FAIL — starting anyway'; uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000} --log-level info"
healthcheckPath = "/api/health"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
