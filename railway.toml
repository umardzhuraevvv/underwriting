[build]
builder = "nixpacks"

[deploy]
startCommand = "echo 'STEP1: starting' && python -c 'print(\"STEP2: python ok\")' && python -c 'from app.main import app; print(\"STEP3: import ok\")' && echo 'STEP4: launching uvicorn' && uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000} --log-level info"
healthcheckPath = "/api/health"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
