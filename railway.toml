[build]
builder = "nixpacks"

[deploy]
startCommand = "alembic upgrade head && python -c 'from app.main import app; print(\"IMPORT OK\")' && uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000} --log-level info"
healthcheckPath = "/api/health"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
